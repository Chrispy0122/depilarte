<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depilarte - Personal</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Security Check -->
    <script>
        const userCheck = JSON.parse(localStorage.getItem('user') || '{}');
        const role = (userCheck.rol || '').toLowerCase();
        if (!localStorage.getItem('usuarioLogueado')) {
            window.location.href = '/';
        } else if (role === 'especialista') {
            window.location.href = '/cabina.html';
        }
    </script>

    <link rel="stylesheet" href="/css/styles.css">
    <link rel="manifest" href="/static/manifest.json">
    <style>
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .staff-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #f1f5f9;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .staff-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .staff-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #94a3b8;
            border: 2px solid #e2e8f0;
        }
        .staff-info {
            flex: 1;
        }
        .staff-name {
            font-weight: 600;
            color: #0f172a;
            margin: 0 0 5px 0;
            font-size: 1.1rem;
        }
        .staff-role {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
            text-transform: capitalize;
        }
        .role-especialista { background: #dbeafe; color: #1e40af; }
        .role-recepcionista { background: #fef3c7; color: #92400e; }
        .role-admin { background: #fee2e2; color: #991b1b; }
        .role-ambos { background: #e0e7ff; color: #3730a3; }
        .staff-status {
            font-size: 0.8rem;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <img src="img/senu-logo.png" alt="NOVUS" style="width: 110px; height: auto; border-radius: 8px;">
                <div style="display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1;">
                    <h1 style="font-weight: 800; font-size: 1.4rem; margin-bottom: 0; color: #0f172a; letter-spacing: -0.5px;">NOVUS</h1>
                    <small style="font-size: 0.75rem; opacity: 0.7; font-weight: 500; color: #475569;">señu software</small>
                </div>
            </div>

            <nav class="menu">
                <a href="index.html" class="menu-item">
                    <i class="fa-solid fa-border-all"></i> Inicio
                </a>
                <a href="agenda.html" class="menu-item">
                    <i class="fa-regular fa-calendar"></i> Agenda
                </a>
                <a href="servicios.html" class="menu-item">
                    <i class="fa-solid fa-list-check"></i> Servicios
                </a>
                <a href="pacientes.html" class="menu-item">
                    <i class="fa-solid fa-users"></i> Pacientes
                </a>
                <a href="cobranza.html" class="menu-item">
                    <i class="fa-solid fa-money-bill-1-wave"></i> Cobranza
                </a>
                <a href="inventario.html" class="menu-item">
                    <i class="fa-solid fa-boxes-stacked"></i> Inventario
                </a>
                <a href="personal.html" class="menu-item active">
                    <i class="fa-solid fa-user-doctor"></i> Personal
                </a>
                <a href="#" class="menu-item" onclick="localStorage.clear(); window.location.href='/';" style="color: #ef4444; margin-top: 15px;">
                    <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                </a>
            </nav>
        </aside>

        <!-- OVERLAY FOR MOBILE -->
        <div class="overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <header class="top-header"
                style="align-items: center; justify-content: space-between; display: flex; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <!-- MOBILE HAMBURGER MENU BUTTON -->
                    <button class="menu-toggle-btn d-md-none" id="menuToggle"
                        style="background:none; border:none; font-size:1.5rem; color:var(--text-dark);">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div>
                        <h2 style="font-weight: 800; color: #3b82f6;">Personal del Spa</h2>
                        <p class="date-subtitle">Gestión de especialistas y recepcionistas</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" onclick="openStaffModal()">
                        <i class="fa-solid fa-plus"></i> Nuevo Empleado
                    </button>
                </div>
            </header>

            <div id="loadingStaff" style="text-align: center; padding: 40px; color: #94a3b8;">
                <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                <p style="margin-top: 10px;">Cargando personal...</p>
            </div>
            
            <div class="staff-grid" id="staffGrid">
                <!-- Cards injected here -->
            </div>

        </main>
    </div>

    <!-- MODAL: NUEVO EMPLEADO -->
    <div class="modal-overlay" id="staffModal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3><i class="fa-solid fa-user-plus"></i> Nuevo Empleado</h3>
                <button class="close-modal" onclick="closeStaffModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="staffForm">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="staffName" required placeholder="Ej: Maria Lopez">
                    </div>
                    <div class="form-group" style="margin-top: 15px;">
                        <label>Rol / Puesto</label>
                        <select id="staffRole" required>
                            <option value="">Seleccione un rol...</option>
                            <option value="especialista">Especialista (Atención en cabina)</option>
                            <option value="recepcionista">Recepcionista</option>
                            <option value="ambos">Ambos (Especialista + Recepción)</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer" style="margin-top: 20px;">
                <button class="btn-secondary" onclick="closeStaffModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveStaff()">Guardar Empleado</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="JS/dialogs.js"></script>
    <script src="JS/personal.js"></script>
</body>

</html>
